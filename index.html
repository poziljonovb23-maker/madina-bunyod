<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Madina 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#ff4d6d,#ffb3c1);
  text-align:center;
  color:white;
  overflow:hidden;
}

/* LOGIN */
#login{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  background:rgba(255,255,255,0.1);
  padding:25px;
  border-radius:15px;
}

input{
  padding:10px;
  border:none;
  border-radius:10px;
  text-align:center;
}

button{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:white;
  color:#ff4d6d;
  cursor:pointer;
  font-weight:bold;
}

/* PAGE */
.page{
  display:none;
  padding:30px;
}

.active{display:block;}

h1{
  font-size:40px;
}

/* HEART */
.heart{
  position:absolute;
  top:-10px;
  font-size:16px;
  animation:fall 5s linear infinite;
}

@keyframes fall{
  to{transform:translateY(110vh);opacity:0;}
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h3>🔐 Parol kiriting</h3>
    <input type="password" id="pass">
    <br>
    <button onclick="check()">Kirish</button>
  </div>
</div>

<!-- PAGE 1 -->
<div class="page active" id="p1">
  <h1>Salom Madina 💖</h1>
  <p>Siz uchun maxsus sayt</p>
  <button onclick="go(2)">Ochish</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
  <h2>💖 Minnatdorchilik</h2>

  <p>Siz mening hayotimda borligingiz uchun rahmat</p>
  <p>Siz menga kuch berasiz</p>
  <p>Siz bilan hamma narsa chiroyli</p>
  <p>Siz eng qadrli insonimsiz</p>

  <p>❤️ Seni sevaman | I love you | Je t’aime ❤️</p>

  <button onclick="go(1)">Orqaga</button>
</div>

<script>

const password = "Madina1117";

/* LOGIN */
function check(){
  let v = document.getElementById("pass").value;
  if(v === password){
    document.getElementById("login").style.display="none";
    startHearts();
  } else {
    alert("❌ Parol noto‘g‘ri");
  }
}

/* PAGE SWITCH */
function go(n){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("p"+n).classList.add("active");
}

/* HEARTS */
function heart(){
  let h=document.createElement("div");
  h.classList.add("heart");
  h.innerHTML="❤️";
  h.style.left=Math.random()*100+"vw";
  h.style.animationDuration=(3+Math.random()*3)+"s";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
}

function startHearts(){
  setInterval(heart,300);
}

</script>

</body>
</html>
